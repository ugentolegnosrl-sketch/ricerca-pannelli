<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial;
  background:#f3f3f3;
  padding:15px;
}

.container{
  max-width:500px;
  margin:auto;
}

input{
  width:100%;
  padding:14px;
  margin:6px 0;
  font-size:16px;
  box-sizing:border-box;
}

.card{
  background:white;
  margin-top:12px;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.posizione{
  font-size:28px;
  font-weight:bold;
  color:#2e7d32;
}

.origine{
  font-size:22px;
  font-weight:bold;
  color:#1565c0;
}

.nome{
  font-size:22px;
  font-weight:bold;
  margin-bottom:8px;
}

.codice{
  font-size:14px;
  color:#666;
  margin-bottom:8px;
  word-break:break-all;
}

.qta{
  font-size:18px;
  font-weight:bold;
  color:#444;
  margin-top:8px;
}

.misure{
  font-size:16px;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="container">

<h2>Ricerca prodotto</h2>

<input id="nome" placeholder="Nome o codice">
<input id="lunghezza" placeholder="Lunghezza">
<input id="larghezza" placeholder="Larghezza">
<input id="spessore" placeholder="Spessore">

<div id="risultati"></div>

</div>

<script>
let prodotti = []

function normalizzaTesto(testo){
  return String(testo || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^\w\s-]/g, " ")
    .replace(/\s+/g, " ")
    .trim()
}

function nomeCompatibile(query, testo){
  const q = normalizzaTesto(query)
  const n = normalizzaTesto(testo)

  if(!q) return true
  if(n.includes(q)) return true

  const paroleQuery = q.split(" ").filter(Boolean)
  const paroleNome = n.split(" ").filter(Boolean)

  if(paroleQuery.length === 0) return true

  let trovate = 0

  for(const parolaQ of paroleQuery){
    const match = paroleNome.some(parolaN =>
      parolaN.includes(parolaQ) || parolaQ.includes(parolaN)
    )
    if(match) trovate++
  }

  const minRichieste = paroleQuery.length <= 2
    ? paroleQuery.length
    : paroleQuery.length - 1

  return trovate >= minRichieste
}

function numeroCompatibile(valoreFiltro, valoreProdotto){
  const filtro = String(valoreFiltro || "").trim().replace(",", ".")
  if(!filtro) return true

  const a = Number(filtro)
  const b = Number(String(valoreProdotto || "").trim().replace(",", "."))

  if(!Number.isFinite(a) || !Number.isFinite(b)) return false
  return a === b
}

async function carica(){
  const res = await fetch("/api/products")
  const data = await res.json()

  if(!res.ok || !data.ok){
    throw new Error((data && data.error) || "Errore caricamento prodotti")
  }

  prodotti = (data.products || []).map(p => ({
    codice: p.codice || "",
    nome: p.nome || "",
    lunghezza: p.lunghezza ?? "",
    larghezza: p.larghezza ?? "",
    spessore: p.spessore ?? "",
    posizione: p.posizione || "",
    quantita: p.quantita ?? "",
    origine: p.origine || ""
  }))

  mostra(prodotti)
}

function filtra(){
  const nome = document.getElementById("nome").value
  const lung = document.getElementById("lunghezza").value
  const larg = document.getElementById("larghezza").value
  const spess = document.getElementById("spessore").value

  const risultati = prodotti.filter(p => {
    const testoRicerca = `${p.nome} ${p.codice} ${p.posizione} ${p.origine}`

    return (
      nomeCompatibile(nome, testoRicerca) &&
      numeroCompatibile(lung, p.lunghezza) &&
      numeroCompatibile(larg, p.larghezza) &&
      numeroCompatibile(spess, p.spessore)
    )
  })

  mostra(risultati)
}

function mostra(lista){
  const div = document.getElementById("risultati")
  div.innerHTML = ""

  lista.slice(0, 50).forEach(p => {
    div.innerHTML += `
      <div class="card">
        <div class="nome">${escapeHtml(p.nome)}</div>
        <div class="codice">${escapeHtml(p.codice)}</div>
        <div class="posizione">${escapeHtml(p.posizione)}</div>
        <div class="origine">${escapeHtml(p.origine)}</div>
        <div class="misure">${escapeHtml(String(p.lunghezza))} x ${escapeHtml(String(p.larghezza))} x ${escapeHtml(String(p.spessore))}</div>
        <div class="qta">Pezzi: ${escapeHtml(String(p.quantita))}</div>
      </div>
    `
  })

  if(lista.length === 0){
    div.innerHTML = `<div class="card">Nessun risultato</div>`
  }
}

function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;")
}

document.querySelectorAll("input").forEach(i => {
  i.addEventListener("input", filtra)
})

carica().catch(err => {
  document.getElementById("risultati").innerHTML = `
    <div class="card">Errore: ${escapeHtml(err.message)}</div>
  `
})
</script>

</body>
</html>
