<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#f3f3f3;
padding:15px;
}

.container{
max-width:500px;
margin:auto;
}

input{
width:100%;
padding:14px;
margin:6px 0;
font-size:16px;
box-sizing:border-box;
}

.card{
background:white;
margin-top:12px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.codice{
font-size:14px;
font-weight:bold;
color:#666;
margin-bottom:6px;
word-break:break-all;
}

.posizione{
font-size:28px;
font-weight:bold;
color:#2e7d32;
}

.origine{
font-size:22px;
font-weight:bold;
color:#1565c0;
}

.nome{
font-size:22px;
font-weight:bold;
margin-bottom:8px;
}

.quantita{
font-size:18px;
font-weight:bold;
color:#444;
margin-top:6px;
}
</style>
</head>

<body>

<div class="container">

<h2>Ricerca prodotto</h2>

<input id="codice" placeholder="Codice">
<input id="nome" placeholder="Nome">
<input id="lunghezza" placeholder="Lunghezza">
<input id="larghezza" placeholder="Larghezza">
<input id="spessore" placeholder="Spessore">

<div id="risultati"></div>

</div>

<script>
let prodotti = []

function normalizzaTesto(testo){
  return String(testo || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^\w\s-]/g, " ")
    .replace(/\s+/g, " ")
    .trim()
}

function nomeCompatibile(query, nomeProdotto){
  const q = normalizzaTesto(query)
  const n = normalizzaTesto(nomeProdotto)

  if(!q) return true
  if(n.includes(q)) return true

  const paroleQuery = q.split(" ").filter(Boolean)
  const paroleNome = n.split(" ").filter(Boolean)

  if(paroleQuery.length === 0) return true

  let trovate = 0

  for(const parolaQ of paroleQuery){
    const match = paroleNome.some(parolaN =>
      parolaN.includes(parolaQ) || parolaQ.includes(parolaN)
    )
    if(match) trovate++
  }

  const minRichieste = paroleQuery.length <= 2
    ? paroleQuery.length
    : paroleQuery.length - 1

  return trovate >= minRichieste
}

function codiceCompatibile(query, codiceProdotto){
  const q = normalizzaTesto(query)
  const c = normalizzaTesto(codiceProdotto)
  if(!q) return true
  return c.includes(q)
}

async function carica(){
  const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSV795xs_3dfS0oBeQU2ZRq_Wcv8ylSbtL_3Eg7gKUkOH7Doqmt-oaVWCyRXTpdTCH5hY9ConPp0bZj/pub?gid=2031870640&single=true&output=csv"
  const proxy = "https://corsproxy.io/?"

  const res = await fetch(proxy + encodeURIComponent(url))
  const text = await res.text()

  const righe = text.split("\n").slice(1)

  prodotti = righe.map(r => {
    const c = r.split(",")

    return {
      codice: (c[0] || "").trim(),
      nome: (c[1] || "").trim(),
      lunghezza: (c[2] || "").trim(),
      larghezza: (c[3] || "").trim(),
      spessore: (c[4] || "").trim(),
      posizione: (c[5] || "").trim(),
      quantita_pz: (c[6] || "").trim(),
      origine: (c[7] || "").trim()
    }
  }).filter(p =>
    p.codice || p.nome || p.lunghezza || p.larghezza || p.spessore || p.posizione || p.quantita_pz || p.origine
  )

  mostra(prodotti)
}

function filtra(){
  const codice = document.getElementById("codice").value
  const nome = document.getElementById("nome").value
  const lung = document.getElementById("lunghezza").value.trim()
  const larg = document.getElementById("larghezza").value.trim()
  const spess = document.getElementById("spessore").value.trim()

  const risultati = prodotti.filter(p =>
    codiceCompatibile(codice, p.codice) &&
    nomeCompatibile(nome, p.nome) &&
    (!lung || String(p.lunghezza).trim() == lung) &&
    (!larg || String(p.larghezza).trim() == larg) &&
    (!spess || String(p.spessore).trim() == spess)
  )

  mostra(risultati)
}

function mostra(lista){
  const div = document.getElementById("risultati")
  div.innerHTML = ""

  lista.slice(0, 50).forEach(p => {
    div.innerHTML += `
      <div class="card">
        <div class="codice">${p.codice}</div>
        <div class="nome">${p.nome}</div>
        <div class="posizione">${p.posizione}</div>
        <div class="origine">${p.origine}</div>
        <div>${p.lunghezza} x ${p.larghezza} x ${p.spessore}</div>
        <div class="quantita">Pezzi: ${p.quantita_pz}</div>
      </div>
    `
  })
}

document.querySelectorAll("input").forEach(i => {
  i.addEventListener("input", filtra)
})

carica()
</script>

</body>
</html>
