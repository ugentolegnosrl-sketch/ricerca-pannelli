function normalizzaTesto(testo){
  return String(testo || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")   // toglie accenti
    .replace(/[^\w\s]/g, " ")          // toglie punteggiatura
    .replace(/\s+/g, " ")              // spazi multipli
    .trim()
}

    if(match) trovate++
}
})

  // tolleranza: se cerchi 1-2 parole devono esserci tutte,

  const minRichieste = paroleQuery.length <= 2
    ? paroleQuery.length
    : paroleQuery.length - 1

  return trovate >= minRichieste
}
